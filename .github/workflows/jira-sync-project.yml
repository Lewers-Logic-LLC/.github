name: Jira Sync — Project Status Poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Poll project and sync status to Jira
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          PROJECT_ID="PVT_kwDOEDQyes4BYnMb"

          # ---------------------------------------------------------------------------
          # Fetch project items (100 max — enough for RINFRA)
          # ---------------------------------------------------------------------------
          ITEMS=$(gh api graphql \
            -f query='
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        updatedAt
                        content {
                          ... on Issue {
                            body
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }' \
            -f projectId="$PROJECT_ID" | \
            jq '.data.node.items.nodes')

          CUTOFF_EPOCH=$(date -u -d '10 minutes ago' +%s)

          # ---------------------------------------------------------------------------
          # Filter to recently updated items with a jira-key comment and a status
          # ---------------------------------------------------------------------------
          RECENT=$(echo "$ITEMS" | jq -c --argjson cutoff "$CUTOFF_EPOCH" '
            [.[] |
              select(
                (.updatedAt | fromdateiso8601) > $cutoff and
                (.content.body // "" | test("<!-- jira-key: [A-Z]+-[0-9]+ -->"))
              ) |
              {
                jira_key: (
                  .content.body |
                  capture("<!-- jira-key: (?P<key>[A-Z]+-[0-9]+) -->") |
                  .key
                ),
                gh_status: (
                  [.fieldValues.nodes[] |
                    select(.field != null and .field.name == "Status") |
                    .name
                  ] | first // ""
                )
              } |
              select(.gh_status != "")
            ]')

          COUNT=$(echo "$RECENT" | jq 'length')
          echo "Found $COUNT recently updated item(s) to check"

          if [ "$COUNT" -eq 0 ]; then
            echo "Nothing to sync."
            exit 0
          fi

          # ---------------------------------------------------------------------------
          # Transition helper
          # ---------------------------------------------------------------------------
          transition_jira() {
            local jira_key="$1"
            local target_status="$2"

            TRANSITIONS=$(curl -s \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$jira_key/transitions")

            TRANSITION_ID=$(echo "$TRANSITIONS" | \
              jq -r --arg name "$target_status" \
              '.transitions[] | select(.to.name == $name) | .id')

            if [ -z "$TRANSITION_ID" ]; then
              echo "  No transition to '$target_status' available for $jira_key — skipping."
              echo "  Available: $(echo "$TRANSITIONS" | jq -r '[.transitions[].to.name] | join(", ")')"
              return
            fi

            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -X POST \
              -H "Content-Type: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$jira_key/transitions" \
              -d "{\"transition\": {\"id\": \"$TRANSITION_ID\"}}")

            if [ "$HTTP" = "204" ]; then
              echo "  ✅ $jira_key → $target_status"
            else
              echo "  ❌ Transition failed (HTTP $HTTP)"
            fi
          }

          # ---------------------------------------------------------------------------
          # Process each item
          # Use process substitution to keep function in scope (avoids subshell via pipe)
          # ---------------------------------------------------------------------------
          while read -r ITEM; do
            JIRA_KEY=$(echo "$ITEM" | jq -r '.jira_key')
            GH_STATUS=$(echo "$ITEM" | jq -r '.gh_status')

            # Map GitHub column → Jira status
            case "$GH_STATUS" in
              "Backlog")                JIRA_STATUS="Backlog" ;;
              "Ready for Dev")          JIRA_STATUS="Selected for Development" ;;
              "In Progress")            JIRA_STATUS="In Progress" ;;
              "Ready for Dev Review")   JIRA_STATUS="Pending Dev Review" ;;
              "Dev Review In Progress") JIRA_STATUS="Dev Review" ;;
              "Ready QA")               JIRA_STATUS="Ready QA" ;;
              "UAT")                    JIRA_STATUS="UAT" ;;
              "Ready for Deployment")   JIRA_STATUS="Ready for Deployment" ;;
              "Completed")              JIRA_STATUS="Completed" ;;
              "Blocked")                JIRA_STATUS="Blocked" ;;
              "Canceled")               JIRA_STATUS="Canceled" ;;
              *)
                echo "No mapping for '$GH_STATUS' — skipping $JIRA_KEY"
                continue
                ;;
            esac

            # Get current Jira status
            CURRENT_JIRA=$(curl -s \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_KEY?fields=status" | \
              jq -r '.fields.status.name')

            if [ "$CURRENT_JIRA" = "$JIRA_STATUS" ]; then
              echo "$JIRA_KEY already in sync ($JIRA_STATUS) — skipping."
              continue
            fi

            echo "$JIRA_KEY: GitHub='$GH_STATUS', Jira='$CURRENT_JIRA' → transitioning to '$JIRA_STATUS'"
            transition_jira "$JIRA_KEY" "$JIRA_STATUS"

          done < <(echo "$RECENT" | jq -c '.[]')
