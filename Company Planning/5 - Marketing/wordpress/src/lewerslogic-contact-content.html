<!--
  Lewers Logic LLC — Contact Us Page WordPress Content Block

  USAGE: In WPAdmin, create a new Page titled "Contact",
         add a "Custom HTML" block, and paste this file into it.

  BEFORE PASTING:
  - Replace YOUR_WPFORMS_ID with your WPForms contact form ID
  - The contact form CSS is handled by the existing lewers-logic-wpforms.css
-->

<div class="ll-landing">

    <section class="ll-contact-hero">
        <div class="ll-container ll-text-center">
            <h1>Let's Talk</h1>
            <p>Have a project in mind, a question about our services, or want to explore how we can help? Drop us a line.</p>
        </div>
    </section>

    <section class="ll-contact-body">
        <div class="ll-container">
            <div class="ll-contact-grid">

                <!-- Contact Form -->
                <div class="ll-contact-form-wrap">
                    <h2>Send Us a Message</h2>
                    <!-- REPLACE YOUR_WPFORMS_ID with the ID of your WPForms contact form -->
                    [wpforms id="YOUR_WPFORMS_ID"]
                </div>

                <!-- Contact Info Sidebar -->
                <div class="ll-contact-info">
                    <div class="ll-contact-info-card">
                        <h3>General Inquiries</h3>
                        <p><a href="mailto:info@lewerslogic.com">info@lewerslogic.com</a></p>
                    </div>
                    <div class="ll-contact-info-card">
                        <h3>Sales</h3>
                        <p><a href="mailto:sales@lewerslogic.com">sales@lewerslogic.com</a></p>
                    </div>
                    <div class="ll-contact-info-card">
                        <h3>Office</h3>
                        <p>981 HWY 305 N<br>Senatobia, MS 38668</p>
                    </div>
                </div>

            </div>
        </div>
    </section>

</div><!-- end .ll-landing -->
