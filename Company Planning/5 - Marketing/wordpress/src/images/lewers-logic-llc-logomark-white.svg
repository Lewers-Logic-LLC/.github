  <!-- Right curly bracket } -->
  <path d="M 240 30
           Q 240 30, 252 30
           Q 272 30, 272 55
           L 272 95
           Q 272 115, 288 127
           Q 272 139, 272 159
           L 272 195
           Q 272 220, 252 220
           Q 240 220, 240 220"
        fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Box around the L -->
  <rect x="115" y="65" width="90" height="120" rx="7" ry="7"
        fill="none" stroke="#FFFFFF" stroke-width="9"/>
  <!-- Teal L -->
  <path d="M 140 88 L 140 158 L 185 158"
        fill="none" stroke="#25A09C" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
